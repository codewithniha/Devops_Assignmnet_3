<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #2c3e50; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        nav h1 { color: white; margin: 0; font-size: 20px; }
        nav a { color: #ecf0f1; text-decoration: none; margin-left: 20px; }
        nav a:hover { color: #3498db; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .flash { padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; }
        .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .flash.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .search-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-form input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .search-form button { padding: 8px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #2c3e50; color: white; padding: 12px 15px; text-align: left; }
        td { padding: 10px 15px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9f9f9; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-high { background: #ffe0e0; color: #c0392b; }
        .badge-medium { background: #fff3cd; color: #856404; }
        .badge-low { background: #d4edda; color: #155724; }
        .badge-pending { background: #e2e3e5; color: #383d41; }
        .badge-progress { background: #cce5ff; color: #004085; }
        .badge-done { background: #d4edda; color: #155724; }
        .btn { padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; cursor: pointer; border: none; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-add { background: #27ae60; color: white; padding: 10px 20px; font-size: 15px; }
        form label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        form input, form textarea, form select { width: 100%; padding: 8px 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        form textarea { height: 80px; resize: vertical; }
        form .btn-submit { background: #2c3e50; color: white; padding: 10px 25px; font-size: 15px; width: auto; }
        .form-card { background: white; padding: 30px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .empty { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>
    <nav>
        <h1 id="nav-title">📋 Student Task Manager</h1>
        <div>
            <a href="{{ url_for('index') }}" id="nav-home">Home</a>
            <a href="{{ url_for('add_task') }}" id="nav-add">+ Add Task</a>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="flash {{ category }}" id="flash-message">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
