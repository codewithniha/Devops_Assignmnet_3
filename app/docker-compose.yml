version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: taskdb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: taskapp
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: taskdb
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
